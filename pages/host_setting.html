<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主播词条设置</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; background: #0d0d12; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes fadeUp { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes tagIn { 0% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }

    .section-enter { animation: fadeUp 0.4s ease-out forwards; }
    .tag-enter { animation: tagIn 0.25s cubic-bezier(0.34,1.56,0.64,1) forwards; }

    .toggle-on { background: linear-gradient(135deg, #f97316, #ef4444); }
    .toggle-off { background: rgba(255,255,255,0.12); }

    .custom-tag {
      position: relative;
      border: 1px dashed rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
      transition: all 0.2s;
    }
    .custom-tag:active { transform: scale(0.95); }
    .custom-tag .del-btn {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ef4444;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: white;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .custom-tag:hover .del-btn, .custom-tag.show-del .del-btn { opacity: 1; }

    .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); }

    .input-field {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus { border-color: rgba(249,115,22,0.6); }
    .input-field::placeholder { color: rgba(255,255,255,0.25); }

    .primary-btn {
      background: linear-gradient(135deg, #f97316, #ef4444);
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .primary-btn:active { transform: scale(0.96); }
  </style>
</head>
<body class="text-white min-h-screen pb-10">

  <!-- 顶部导航 -->
  <div class="sticky top-0 z-20" style="background: rgba(13,13,18,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.06);">
    <div class="flex items-center justify-between px-4 py-3">
      <button onclick="window.history.back()" class="w-8 h-8 flex items-center justify-center">
        <i class="fas fa-chevron-left text-gray-400"></i>
      </button>
      <h1 class="text-base font-semibold">引导词条管理</h1>
      <button id="saveBtn" class="text-orange-400 text-sm font-medium opacity-50" disabled>保存</button>
    </div>
  </div>

  <div class="px-4 pt-4 space-y-4">

    <!-- 功能开关 -->
    <div class="glass rounded-2xl p-4 section-enter" style="animation-delay:0.05s">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-sm font-medium">词条引导功能</div>
          <div class="text-xs text-gray-400 mt-0.5">开启后，观众直播间底部将显示推荐发言词条</div>
        </div>
        <div id="mainToggle" class="w-12 h-6 rounded-full toggle-on cursor-pointer flex items-center px-1 transition-all" onclick="toggleMain(this)">
          <div class="w-5 h-5 rounded-full bg-white shadow-sm ml-auto transition-all"></div>
        </div>
      </div>
    </div>

    <!-- 实时数据卡片 -->
    <div class="section-enter" style="animation-delay:0.1s">
      <div class="text-xs text-gray-500 uppercase tracking-wider mb-2 px-1">今日数据</div>
      <div class="grid grid-cols-3 gap-2">
        <div class="stat-card rounded-2xl p-3 text-center">
          <div class="text-xl font-bold text-orange-400">2,341</div>
          <div class="text-xs text-gray-400 mt-1">词条展示次数</div>
        </div>
        <div class="stat-card rounded-2xl p-3 text-center">
          <div class="text-xl font-bold text-rose-400">847</div>
          <div class="text-xs text-gray-400 mt-1">点击发言次数</div>
        </div>
        <div class="stat-card rounded-2xl p-3 text-center">
          <div class="text-xl font-bold text-green-400">36%</div>
          <div class="text-xs text-gray-400 mt-1">互动转化率</div>
        </div>
      </div>
    </div>

    <!-- 主播专属词条 -->
    <div class="glass rounded-2xl p-4 section-enter" style="animation-delay:0.15s">
      <div class="flex items-center justify-between mb-3">
        <div>
          <div class="text-sm font-medium flex items-center gap-1.5">
            <span class="w-1.5 h-1.5 rounded-full bg-pink-400 inline-block"></span>
            主播专属词条
          </div>
          <div class="text-xs text-gray-400 mt-0.5">最多可设置 5 个，优先展示给观众</div>
        </div>
        <div id="customToggle" class="w-10 h-5 rounded-full toggle-on cursor-pointer flex items-center px-1 transition-all" onclick="toggleCustom(this)">
          <div class="w-4 h-4 rounded-full bg-white shadow-sm ml-auto transition-all"></div>
        </div>
      </div>

      <!-- 现有专属词条 -->
      <div id="customTagArea" class="flex flex-wrap gap-2 mb-3">
        <div class="custom-tag show-del text-white text-xs font-medium rounded-full px-3 py-1.5 tag-enter flex items-center">
          我要参与抽奖！🎉
          <button class="del-btn" onclick="delTag(this.closest('.custom-tag'))"><i class="fas fa-times" style="font-size:7px;"></i></button>
        </div>
        <div class="custom-tag show-del text-white text-xs font-medium rounded-full px-3 py-1.5 tag-enter flex items-center" style="animation-delay:0.05s">
          主播送我！🙏
          <button class="del-btn" onclick="delTag(this.closest('.custom-tag'))"><i class="fas fa-times" style="font-size:7px;"></i></button>
        </div>
        <div class="custom-tag show-del text-white text-xs font-medium rounded-full px-3 py-1.5 tag-enter flex items-center" style="animation-delay:0.1s">
          已转发分享✅
          <button class="del-btn" onclick="delTag(this.closest('.custom-tag'))"><i class="fas fa-times" style="font-size:7px;"></i></button>
        </div>
      </div>

      <!-- 添加词条输入 -->
      <div class="flex gap-2">
        <input
          id="newTagInput"
          type="text"
          placeholder="输入新词条内容（最多15字）"
          maxlength="15"
          class="input-field flex-1 rounded-xl px-3 py-2 text-sm"
        >
        <button onclick="addCustomTag()" class="primary-btn text-white text-sm font-medium px-4 py-2 rounded-xl">
          添加
        </button>
      </div>
    </div>

    <!-- 词条效果排行 -->
    <div class="glass rounded-2xl p-4 section-enter" style="animation-delay:0.2s">
      <div class="text-sm font-medium mb-3 flex items-center gap-1.5">
        <i class="fas fa-chart-bar text-orange-400 text-sm"></i>
        词条效果排行
      </div>
      <div class="space-y-2">
        <!-- 词条排行项 -->
        <div class="flex items-center gap-3">
          <span class="text-orange-400 font-bold text-sm w-5 text-center">1</span>
          <div class="flex-1">
            <div class="flex items-center justify-between mb-1">
              <span class="text-sm text-white">求链接！🔗</span>
              <span class="text-xs text-gray-400">248次</span>
            </div>
            <div class="h-1.5 rounded-full bg-gray-800 overflow-hidden">
              <div class="h-full rounded-full" style="width:92%; background: linear-gradient(90deg, #f97316, #ef4444);"></div>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-gray-300 font-bold text-sm w-5 text-center">2</span>
          <div class="flex-1">
            <div class="flex items-center justify-between mb-1">
              <span class="text-sm text-white">哈哈哈太搞笑了 😂</span>
              <span class="text-xs text-gray-400">183次</span>
            </div>
            <div class="h-1.5 rounded-full bg-gray-800 overflow-hidden">
              <div class="h-full rounded-full" style="width:68%; background: linear-gradient(90deg, #a78bfa, #818cf8);"></div>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-yellow-600 font-bold text-sm w-5 text-center">3</span>
          <div class="flex-1">
            <div class="flex items-center justify-between mb-1">
              <span class="text-sm text-white">主播加油！💪</span>
              <span class="text-xs text-gray-400">142次</span>
            </div>
            <div class="h-1.5 rounded-full bg-gray-800 overflow-hidden">
              <div class="h-full rounded-full" style="width:53%; background: linear-gradient(90deg, #4ade80, #22d3ee);"></div>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-gray-500 font-bold text-sm w-5 text-center">4</span>
          <div class="flex-1">
            <div class="flex items-center justify-between mb-1">
              <span class="text-sm text-gray-300">已下单支持！🛍️</span>
              <span class="text-xs text-gray-400">96次</span>
            </div>
            <div class="h-1.5 rounded-full bg-gray-800 overflow-hidden">
              <div class="h-full rounded-full" style="width:36%; background: linear-gradient(90deg, #fbbf24, #f97316);"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 智能推送设置 -->
    <div class="glass rounded-2xl p-4 section-enter" style="animation-delay:0.25s">
      <div class="text-sm font-medium mb-3 flex items-center gap-1.5">
        <i class="fas fa-brain text-purple-400 text-sm"></i>
        智能推送设置
      </div>
      <div class="space-y-3">
        <div class="flex items-center justify-between">
          <div>
            <div class="text-sm">互动低谷自动触发</div>
            <div class="text-xs text-gray-400 mt-0.5">30秒内互动不足时弹出词条提示</div>
          </div>
          <div class="w-10 h-5 rounded-full toggle-on cursor-pointer flex items-center px-1" onclick="toggleSmall(this)">
            <div class="w-4 h-4 rounded-full bg-white shadow-sm ml-auto"></div>
          </div>
        </div>
        <div class="h-px bg-gray-800"></div>
        <div class="flex items-center justify-between">
          <div>
            <div class="text-sm">词条定时轮播</div>
            <div class="text-xs text-gray-400 mt-0.5">每隔一段时间自动刷新词条内容</div>
          </div>
          <div class="w-10 h-5 rounded-full toggle-off cursor-pointer flex items-center px-1" onclick="toggleSmall(this)">
            <div class="w-4 h-4 rounded-full bg-white shadow-sm transition-all"></div>
          </div>
        </div>
        <div class="h-px bg-gray-800"></div>
        <div class="flex items-center justify-between">
          <div>
            <div class="text-sm">新人专属引导</div>
            <div class="text-xs text-gray-400 mt-0.5">首次进入直播间的用户显示新人词条</div>
          </div>
          <div class="w-10 h-5 rounded-full toggle-on cursor-pointer flex items-center px-1" onclick="toggleSmall(this)">
            <div class="w-4 h-4 rounded-full bg-white shadow-sm ml-auto"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 立即生效按钮 -->
    <button class="primary-btn w-full text-white font-semibold py-3.5 rounded-2xl text-base section-enter" style="animation-delay:0.3s" onclick="saveSettings()">
      立即生效
    </button>

  </div>

  <!-- 保存成功提示 -->
  <div id="successToast" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 glass rounded-2xl px-6 py-3 flex items-center gap-2 z-50 opacity-0 pointer-events-none transition-all duration-300">
    <i class="fas fa-check-circle text-green-400"></i>
    <span class="text-white text-sm font-medium">设置已保存</span>
  </div>

  <script>
    function toggleMain(el) {
      const dot = el.querySelector('div');
      if (el.classList.contains('toggle-on')) {
        el.classList.remove('toggle-on');
        el.classList.add('toggle-off');
        dot.style.marginLeft = '0';
        dot.style.marginRight = 'auto';
      } else {
        el.classList.remove('toggle-off');
        el.classList.add('toggle-on');
        dot.style.marginLeft = 'auto';
        dot.style.marginRight = '0';
      }
    }

    function toggleCustom(el) {
      const dot = el.querySelector('div');
      if (el.classList.contains('toggle-on')) {
        el.classList.remove('toggle-on');
        el.classList.add('toggle-off');
        dot.style.marginLeft = '0';
        dot.style.marginRight = 'auto';
      } else {
        el.classList.remove('toggle-off');
        el.classList.add('toggle-on');
        dot.style.marginLeft = 'auto';
        dot.style.marginRight = '0';
      }
    }

    function toggleSmall(el) {
      const dot = el.querySelector('div');
      if (el.classList.contains('toggle-on')) {
        el.classList.remove('toggle-on');
        el.classList.add('toggle-off');
        dot.style.marginLeft = '0';
        dot.style.marginRight = 'auto';
      } else {
        el.classList.remove('toggle-off');
        el.classList.add('toggle-on');
        dot.style.marginLeft = 'auto';
        dot.style.marginRight = '0';
      }
    }

    function addCustomTag() {
      const input = document.getElementById('newTagInput');
      const text = input.value.trim();
      if (!text) return;
      const area = document.getElementById('customTagArea');
      if (area.children.length >= 5) {
        alert('最多添加5个专属词条');
        return;
      }
      const el = document.createElement('div');
      el.className = 'custom-tag show-del text-white text-xs font-medium rounded-full px-3 py-1.5 tag-enter flex items-center';
      el.innerHTML = `${text}<button class="del-btn" onclick="delTag(this.closest('.custom-tag'))"><i class="fas fa-times" style="font-size:7px;"></i></button>`;
      area.appendChild(el);
      input.value = '';
    }

    function delTag(el) {
      el.style.transition = 'all 0.2s';
      el.style.transform = 'scale(0)';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 200);
    }

    function saveSettings() {
      const toast = document.getElementById('successToast');
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 1500);
    }
  </script>
</body>
</html>
